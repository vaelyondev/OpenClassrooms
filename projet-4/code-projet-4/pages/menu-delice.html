<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le délice des sens</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header class="header-menu">
        <a href="../index.html" class="back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <a href="../index.html" class="logo">
            <img src="../images/logo/ohmyfood.png" alt="logo">
        </a>
    </header>

    <div class="restaurant-image">
        <img src="../images/restaurants/louis-hansel-shotsoflouis-qNBGVyOCY8Q-unsplash.jpg" alt="Le délice des sens">
    </div>

    <main class="menu">

        <div class="menu-header">
            <h1>Le délice des sens</h1>

            <div class="heart">
                <input type="checkbox" class="heart-checkbox" id="heart-menu">

                <label for="heart-menu" class="heart-label">
                    <i class="fa-regular fa-heart heart-empty"></i>
                    <i class="fa-solid fa-heart heart-full"></i>
                </label>
            </div>
        </div>

        <section class="menu-section">
            <h2>Entrées</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Tartare de thon</h3>
                    <p>Assaisonné au yuzu</p>
                </div>
                <span class="price">25€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Bouchée de homard croustillant</h3>
                    <p>Et sa farandole de petits légumes</p>
                </div>
                <span class="price">35€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Poulet rôti aux herbes de Provence</h3>
                    <p>Et sa crème de truffe</p>
                </div>
                <span class="price">40€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <section class="menu-section">
            <h2>Plats</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Poulet rôti aux herbes de Provence</h3>
                    <p>Et sa crème de truffe</p>
                </div>
                <span class="price">40€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Langouste rôtie</h3>
                    <p>Et ses légumes de saison</p>
                </div>
                <span class="price">35€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Côte de boeuf Angus</h3>
                    <p>Et sa purée de panais</p>
                </div>
                <span class="price">44€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <section class="menu-section">
            <h2>Desserts</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Farandole de desserts</h3>
                    <p>Du chef</p>
                </div>
                <span class="price">18€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Crème brulée</h3>
                    <p>Revisitée</p>
                </div>
                <span class="price">22€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Tiramisu</h3>
                    <p>A la noisette</p>
                </div>
                <span class="price">23€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <div class="order">
            <button>Commander</button>
        </div>

    </main>

    <footer class="footer">
        <img src="../images/logo/ohmyfood.png" alt="ohmyfood">

        <ul>
            <li>
                <i class="fa-solid fa-utensils"></i>
                Proposer un restaurant
            </li>
            <li>
                <i class="fa-solid fa-handshake-angle"></i>
                Devenir partenaire
            </li>
            <li>Mentions légales</li>
            <li><a href="mailto:contact@ohmyfood.com">Contact</a></li>
        </ul>
    </footer>

</body>

</html>
