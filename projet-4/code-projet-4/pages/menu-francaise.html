<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À la française</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header class="header-menu">
        <a href="../index.html" class="back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div class="logo">
            <img src="../images/logo/ohmyfood.png" alt="logo">
        </div>
    </header>

    <div class="restaurant-image">
        <img src="../images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg" alt="Le délice des sens">
    </div>

    <main class="menu">

        <div class="menu-header">
            <h1>À la française</h1>

            <div class="heart">
                <input type="checkbox" class="heart-checkbox" id="heart-menu">

                <label for="heart-menu" class="heart-label">
                    <i class="fa-regular fa-heart heart-empty"></i>
                    <i class="fa-solid fa-heart heart-full"></i>
                </label>
            </div>
        </div>

        <section class="menu-section">
            <h2>Entrées</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Tartare de poulpe acidulé</h3>
                    <p>Aux zestes d'orange</p>
                </div>
                <span class="price">25€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Velouté de légumes d'antan</h3>
                    <p>Carotte, panais, topinambour</p>
                </div>
                <span class="price">35€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Soupe à l'oignon</h3>
                    <p>Revisitée</p>
                </div>
                <span class="price">20€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <section class="menu-section">
            <h2>Plats</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Coquilles Saint-Jacques</h3>
                    <p>Accompagnées d'une purée de panais</p>
                </div>
                <span class="price">40€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Magret de canard</h3>
                    <p>Et parmentier de pommes de terre</p>
                </div>
                <span class="price">35€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Pigeonneau d'Ille-et-Vilaine</h3>
                    <p>Sur son lit de gnocchis aux légumes</p>
                </div>
                <span class="price">44€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <section class="menu-section">
            <h2>Desserts</h2>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Pétales de violettes glacés</h3>
                    <p>Et purée de noisettes</p>
                </div>
                <span class="price">18€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Fondant au chocolat</h3>
                    <p>Revisité</p>
                </div>
                <span class="price">22€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>

            <label class="menu-card">
                <input type="checkbox" class="menu-card-input">
                <div class="menu-card-text">
                    <h3>Millefeuille croustillant</h3>
                    <p>Mytilles et pâte d'amande</p>
                </div>
                <span class="price">23€</span>
                <div class="menu-check">
                    <i class="fa-solid fa-check"></i>
                </div>
            </label>
        </section>

        <div class="order">
            <button>Commander</button>
        </div>

    </main>

    <footer class="footer">
        <img src="../images/logo/ohmyfood.png" alt="ohmyfood">

        <ul>
            <li>
                <i class="fa-solid fa-utensils"></i>
                Proposer un restaurant
            </li>
            <li>
                <i class="fa-solid fa-handshake-angle"></i>
                Devenir partenaire
            </li>
            <li>Mentions légales</li>
            <li><a href="mailto:contact@ohmyfood.com">Contact</a></li>
        </ul>
    </footer>

</body>

</html>
